<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Copilot Bridge · Usage</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <script src="https://unpkg.com/lucide-react@0.378.0/dist/umd/lucide.min.js"></script>

    <style>
      :root {
        --bg: #0a0b0d;
        --bg-grid: #0f1115;
        --panel: #13161b;
        --panel-2: #181c23;
        --panel-hover: #1c2129;
        --border: #232831;
        --border-strong: #2e3440;
        --text: #e6e8eb;
        --text-muted: #9aa3af;
        --text-dim: #6b7280;

        --accent: #818cf8;
        --accent-strong: #6366f1;
        --accent-glow: rgba(99, 102, 241, 0.18);

        --success: #34d399;
        --success-bg: rgba(52, 211, 153, 0.12);
        --warning: #fbbf24;
        --warning-bg: rgba(251, 191, 36, 0.12);
        --danger: #f87171;
        --danger-bg: rgba(248, 113, 113, 0.12);
        --info: #38bdf8;
        --info-bg: rgba(56, 189, 248, 0.12);
      }

      * {
        -webkit-font-smoothing: antialiased;
      }

      html,
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif;
      }

      body {
        background-image: radial-gradient(
            ellipse 80% 50% at 50% -10%,
            var(--accent-glow),
            transparent 60%
          ),
          radial-gradient(
            circle at 0 0,
            rgba(99, 102, 241, 0.05),
            transparent 40%
          );
        background-attachment: fixed;
      }

      .font-mono {
        font-family: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
        font-variant-numeric: tabular-nums;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 0.875rem;
        transition:
          background 0.15s ease,
          border-color 0.15s ease,
          transform 0.15s ease;
      }
      .card:hover {
        background: var(--panel-hover);
        border-color: var(--border-strong);
      }

      .input {
        background: var(--bg-grid);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 0.625rem;
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
      }
      .input:focus {
        outline: none;
        border-color: var(--accent-strong);
        box-shadow: 0 0 0 3px var(--accent-glow);
      }
      .input::placeholder {
        color: var(--text-dim);
      }

      .btn-primary {
        background: var(--accent-strong);
        color: white;
        border-radius: 0.625rem;
        font-weight: 600;
        transition:
          background 0.15s,
          transform 0.05s;
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.08) inset;
      }
      .btn-primary:hover {
        background: var(--accent);
      }
      .btn-primary:active {
        transform: translateY(1px);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        padding: 0.125rem 0.5rem;
        border-radius: 9999px;
        font-size: 0.6875rem;
        font-weight: 600;
        letter-spacing: 0.01em;
      }

      /* progress bar */
      .progress-track {
        background: var(--bg-grid);
        border-radius: 9999px;
        overflow: hidden;
        height: 6px;
      }
      .progress-fill {
        height: 100%;
        border-radius: 9999px;
        transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
      }
      .progress-fill::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.18),
          transparent
        );
      }

      /* scrollbar */
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border-strong);
        border-radius: 9999px;
        border: 2px solid var(--bg);
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #3a4150;
      }

      /* code/detail block */
      .detail-block {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 0.875rem;
      }

      .key-pill {
        color: var(--text-muted);
        font-weight: 500;
      }

      .val-string {
        color: #93c5fd;
      }
      .val-number {
        color: #f9a8d4;
      }
      .val-bool-true {
        color: var(--success);
      }
      .val-bool-false {
        color: var(--danger);
      }
      .val-null {
        color: var(--text-dim);
        font-style: italic;
      }
      .val-array {
        color: var(--text-dim);
      }

      .skeleton {
        background: linear-gradient(
          90deg,
          var(--panel) 0%,
          var(--panel-hover) 50%,
          var(--panel) 100%
        );
        background-size: 200% 100%;
        animation: shimmer 1.4s infinite;
        border-radius: 0.625rem;
      }
      @keyframes shimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }

      .divider {
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--border-strong),
          transparent
        );
      }

      .link {
        color: var(--text-muted);
        transition: color 0.15s;
      }
      .link:hover {
        color: var(--accent);
      }

      /* select-all helper for endpoint */
      #endpoint-url:focus {
        background: var(--bg);
      }
    </style>
  </head>
  <body class="antialiased">
    <div id="app" class="min-h-screen flex flex-col">
      <div class="flex-1 px-4 sm:px-6 lg:px-8 py-8">
        <div class="max-w-6xl mx-auto">
          <!-- Header -->
          <header class="mb-8">
            <div class="flex items-center gap-3">
              <div
                class="h-10 w-10 rounded-xl flex items-center justify-center"
                style="
                  background: linear-gradient(
                    135deg,
                    var(--accent-strong),
                    #a855f7
                  );
                  box-shadow: 0 6px 20px var(--accent-glow);
                "
              >
                <i data-lucide="activity" class="h-5 w-5 text-white"></i>
              </div>
              <div>
                <h1 class="text-xl font-semibold tracking-tight">
                  Copilot Bridge
                  <span style="color: var(--text-muted)">/ Usage</span>
                </h1>
                <p class="text-xs mt-0.5" style="color: var(--text-dim)">
                  Live quota snapshot from your local bridge endpoint
                </p>
              </div>
            </div>
          </header>

          <!-- Endpoint Form -->
          <div class="card p-4 mb-8">
            <form
              id="endpoint-form"
              class="flex flex-col sm:flex-row items-stretch sm:items-center gap-3"
            >
              <div
                class="flex items-center gap-2 px-3 text-xs font-medium whitespace-nowrap"
                style="color: var(--text-muted)"
              >
                <i data-lucide="link" class="h-3.5 w-3.5"></i>
                Endpoint
              </div>
              <input
                type="text"
                id="endpoint-url"
                class="input flex-1 px-3.5 py-2 text-sm font-mono"
                placeholder="http://localhost:4142/usage"
                spellcheck="false"
                autocomplete="off"
              />
              <button
                id="fetch-button"
                type="submit"
                class="btn-primary px-5 py-2 text-sm flex items-center justify-center gap-2 whitespace-nowrap"
              >
                <i data-lucide="refresh-cw" class="h-3.5 w-3.5"></i>
                <span>Fetch</span>
              </button>
            </form>
          </div>

          <!-- Content -->
          <main id="content-area"></main>
        </div>
      </div>

      <!-- Footer -->
      <footer
        class="border-t mt-8 py-5 text-center text-xs"
        style="border-color: var(--border); color: var(--text-dim)"
      >
        <div class="max-w-6xl mx-auto px-4 flex flex-col sm:flex-row items-center justify-center gap-2">
          <span>
            Vibe coded by
            <a
              href="https://claude.ai"
              target="_blank"
              rel="noopener noreferrer"
              class="link underline underline-offset-2"
              >Claude</a
            >
          </span>
          <span class="hidden sm:inline" style="color: var(--border-strong)">·</span>
          <a
            href="https://github.com/betaHi/copilot-bridge"
            target="_blank"
            rel="noopener noreferrer"
            class="link inline-flex items-center gap-1"
          >
            <i data-lucide="github" class="h-3 w-3"></i>
            GitHub
          </a>
          <span class="hidden sm:inline" style="color: var(--border-strong)">·</span>
          <span>
            based on
            <a
              href="https://github.com/uheej0625/copilot-usage-viewer"
              target="_blank"
              rel="noopener noreferrer"
              class="link underline underline-offset-2"
              >copilot-usage-viewer</a
            >
          </span>
        </div>
      </footer>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const endpointForm = document.getElementById("endpoint-form");
        const endpointUrlInput = document.getElementById("endpoint-url");
        const contentArea = document.getElementById("content-area");

        const DEFAULT_ENDPOINT = "http://localhost:4142/usage";

        const state = {
          isLoading: false,
          error: null,
          data: null,
        };

        function createIcons() {
          if (typeof lucide !== "undefined") lucide.createIcons();
        }

        function render() {
          if (state.isLoading) {
            contentArea.innerHTML = renderSkeleton();
          } else if (state.error) {
            contentArea.innerHTML = renderError(state.error);
          } else if (state.data) {
            contentArea.innerHTML = `
              ${renderSummary(state.data)}
              ${renderUsageQuotas(state.data.quota_snapshots)}
              ${renderDetailedData(state.data)}
            `;
          } else {
            contentArea.innerHTML = renderWelcome();
          }
          createIcons();
        }

        function renderSummary(data) {
          const items = [];
          if (data.login)
            items.push({
              icon: "user",
              label: "Account",
              value: data.login,
            });
          if (data.copilot_plan)
            items.push({
              icon: "package",
              label: "Plan",
              value: String(data.copilot_plan).replace(/_/g, " "),
            });
          if (data.assigned_date)
            items.push({
              icon: "calendar",
              label: "Assigned",
              value: data.assigned_date.split("T")[0],
            });
          if (typeof data.chat_enabled === "boolean")
            items.push({
              icon: "message-square",
              label: "Chat",
              value: data.chat_enabled ? "Enabled" : "Disabled",
              tone: data.chat_enabled ? "success" : "danger",
            });
          if (!items.length) return "";
          return `
            <section class="mb-8">
              <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                ${items
                  .map(
                    (it) => `
                  <div class="card p-3.5">
                    <div class="flex items-center gap-2 text-[11px] uppercase tracking-wider" style="color: var(--text-dim);">
                      <i data-lucide="${it.icon}" class="h-3 w-3"></i>
                      ${it.label}
                    </div>
                    <div class="mt-1.5 text-sm font-medium capitalize ${
                      it.tone === "success"
                        ? ""
                        : it.tone === "danger"
                          ? ""
                          : ""
                    }" style="${
                      it.tone === "success"
                        ? "color: var(--success);"
                        : it.tone === "danger"
                          ? "color: var(--danger);"
                          : ""
                    }">${escapeHtml(String(it.value))}</div>
                  </div>
                `,
                  )
                  .join("")}
              </div>
            </section>
          `;
        }

        function renderUsageQuotas(snapshots) {
          if (!snapshots || !Object.keys(snapshots).length) return "";
          const cards = Object.entries(snapshots)
            .map(([key, value]) => renderQuotaCard(key, value))
            .join("");
          return `
            <section id="usage-quotas" class="mb-8">
              <div class="flex items-center justify-between mb-4">
                <h2 class="text-sm font-semibold flex items-center gap-2 uppercase tracking-wider" style="color: var(--text-muted);">
                  <i data-lucide="bar-chart-3" class="h-4 w-4"></i>
                  Usage quotas
                </h2>
              </div>
              <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                ${cards}
              </div>
            </section>
          `;
        }

        function renderQuotaCard(title, details) {
          const { entitlement, remaining, percent_remaining, unlimited } =
            details;
          const percentUsed = unlimited ? 0 : 100 - percent_remaining;
          const used = unlimited
            ? "—"
            : (entitlement - remaining).toLocaleString();

          let fillColor = "var(--success)";
          let badgeStyle = "color: var(--success); background: var(--success-bg);";
          if (percentUsed > 75) {
            fillColor = "var(--warning)";
            badgeStyle = "color: var(--warning); background: var(--warning-bg);";
          }
          if (percentUsed > 90) {
            fillColor = "var(--danger)";
            badgeStyle = "color: var(--danger); background: var(--danger-bg);";
          }
          if (unlimited) {
            fillColor = "var(--info)";
            badgeStyle = "color: var(--info); background: var(--info-bg);";
          }

          const titleNice = title.replace(/_/g, " ");

          return `
            <div class="card p-4">
              <div class="flex items-center justify-between mb-3">
                <h3 class="text-sm font-semibold capitalize" style="color: var(--text);">${escapeHtml(titleNice)}</h3>
                ${
                  unlimited
                    ? `<span class="badge" style="${badgeStyle}">Unlimited</span>`
                    : `<span class="badge font-mono" style="${badgeStyle}">${percentUsed.toFixed(1)}%</span>`
                }
              </div>
              <div class="progress-track mb-3">
                <div class="progress-fill" style="width: ${unlimited ? 100 : Math.min(100, percentUsed)}%; background: ${fillColor};"></div>
              </div>
              <div class="flex justify-between text-xs font-mono" style="color: var(--text-muted);">
                <span><span style="color: var(--text);">${used}</span> / ${unlimited ? "∞" : entitlement.toLocaleString()}</span>
                <span>${unlimited ? "∞" : remaining.toLocaleString()} left</span>
              </div>
            </div>
          `;
        }

        function escapeHtml(s) {
          return String(s)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
        }

        function formatValue(v) {
          if (v === null) return `<span class="val-null">null</span>`;
          if (typeof v === "boolean")
            return `<span class="${v ? "val-bool-true" : "val-bool-false"}">${v}</span>`;
          if (typeof v === "number")
            return `<span class="val-number font-mono">${v}</span>`;
          if (typeof v === "string")
            return `<span class="val-string">"${escapeHtml(v)}"</span>`;
          return `<span class="val-string">${escapeHtml(JSON.stringify(v))}</span>`;
        }

        function formatObject(obj, depth = 0) {
          if (obj === null || typeof obj !== "object") return formatValue(obj);
          const entries = Object.entries(obj);
          return (
            `<div class="${depth > 0 ? "pl-4 border-l" : ""}" style="${depth > 0 ? "border-color: var(--border);" : ""}">` +
            entries
              .map(([key, value]) => {
                const k = escapeHtml(key.replace(/_/g, " "));
                let v;
                if (Array.isArray(value)) {
                  v =
                    value.length > 0
                      ? `<span class="val-array">[ ${value.length} items ]</span>`
                      : `<span class="val-array">[ ]</span>`;
                } else if (typeof value === "object" && value !== null) {
                  v = formatObject(value, depth + 1);
                } else {
                  v = formatValue(value);
                }
                const isInline = !(typeof value === "object" && value !== null && !Array.isArray(value));
                return `<div class="py-1 ${depth === 0 ? "" : ""}">
                          <span class="key-pill capitalize text-xs">${k}</span>${isInline ? `<span class="ml-2">${v}</span>` : v}
                        </div>`;
              })
              .join("") +
            `</div>`
          );
        }

        function renderDetailedData(data) {
          return `
            <section id="detailed-data" class="mb-4">
              <div class="flex items-center justify-between mb-4">
                <h2 class="text-sm font-semibold flex items-center gap-2 uppercase tracking-wider" style="color: var(--text-muted);">
                  <i data-lucide="file-text" class="h-4 w-4"></i>
                  Raw response
                </h2>
                <button id="copy-btn" type="button" class="text-xs px-2.5 py-1 rounded-md flex items-center gap-1.5 link" style="border: 1px solid var(--border);">
                  <i data-lucide="copy" class="h-3 w-3"></i>
                  Copy JSON
                </button>
              </div>
              <div class="detail-block p-5 text-xs">
                ${formatObject(data)}
              </div>
            </section>
          `;
        }

        function renderSkeleton() {
          return `
            <div class="space-y-4">
              <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                ${Array(4).fill('<div class="skeleton h-16"></div>').join("")}
              </div>
              <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                ${Array(6).fill('<div class="skeleton h-28"></div>').join("")}
              </div>
            </div>
          `;
        }

        function renderError(message) {
          return `
            <div class="card p-5 flex items-start gap-3" style="border-color: var(--danger); background: var(--danger-bg);">
              <i data-lucide="alert-triangle" class="h-5 w-5 mt-0.5" style="color: var(--danger);"></i>
              <div class="flex-1">
                <p class="font-semibold text-sm" style="color: var(--danger);">Request failed</p>
                <p class="text-xs mt-1 font-mono break-all" style="color: var(--text-muted);">${escapeHtml(message)}</p>
                <p class="text-xs mt-2" style="color: var(--text-dim);">Make sure your bridge is running and CORS allows this origin.</p>
              </div>
            </div>
          `;
        }

        function renderWelcome() {
          return `
            <div class="card p-12 text-center">
              <div class="inline-flex h-12 w-12 items-center justify-center rounded-xl mb-3" style="background: var(--panel-2); border: 1px solid var(--border);">
                <i data-lucide="sparkles" class="h-5 w-5" style="color: var(--accent);"></i>
              </div>
              <h3 class="text-base font-semibold">Connect your bridge</h3>
              <p class="mt-1 text-sm max-w-md mx-auto" style="color: var(--text-muted);">
                Enter your local bridge URL above (e.g. <span class="font-mono" style="color: var(--text);">http://localhost:4142/usage</span>) and click Fetch.
              </p>
            </div>
          `;
        }

        async function fetchData() {
          const url = endpointUrlInput.value.trim();
          if (!url) {
            state.error = "Endpoint URL cannot be empty.";
            state.isLoading = false;
            render();
            return;
          }
          state.isLoading = true;
          state.error = null;
          render();
          try {
            const response = await fetch(url);
            if (!response.ok) {
              throw new Error(
                `HTTP ${response.status} ${response.statusText}`,
              );
            }
            state.data = await response.json();
          } catch (error) {
            console.error("Fetch error:", error);
            state.data = null;
            state.error = error.message;
          } finally {
            state.isLoading = false;
            render();
          }
        }

        function handleFormSubmit(event) {
          event.preventDefault();
          const url = endpointUrlInput.value.trim();
          try {
            const currentUrl = new URL(window.location);
            currentUrl.searchParams.set("endpoint", url);
            window.history.pushState({}, "", currentUrl);
          } catch (e) {
            console.warn("Could not update URL:", e.message);
          }
          fetchData();
        }

        // copy-to-clipboard delegation
        document.addEventListener("click", (e) => {
          const btn = e.target.closest("#copy-btn");
          if (!btn || !state.data) return;
          navigator.clipboard
            .writeText(JSON.stringify(state.data, null, 2))
            .then(() => {
              btn.innerHTML =
                '<i data-lucide="check" class="h-3 w-3"></i> Copied';
              createIcons();
              setTimeout(() => {
                btn.innerHTML =
                  '<i data-lucide="copy" class="h-3 w-3"></i> Copy JSON';
                createIcons();
              }, 1500);
            })
            .catch(() => {});
        });

        function init() {
          endpointForm.addEventListener("submit", handleFormSubmit);
          const urlParams = new URLSearchParams(window.location.search);
          const endpointFromUrl = urlParams.get("endpoint");
          if (endpointFromUrl) {
            endpointUrlInput.value = endpointFromUrl;
            fetchData();
          } else {
            endpointUrlInput.value = DEFAULT_ENDPOINT;
            render();
          }
          createIcons();
        }

        init();
      });
    </script>
  </body>
</html>
